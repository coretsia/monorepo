name: split-publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: split-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: "prepare split publish matrix"
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: "Checkout: monorepo"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "Setup: PHP 8.4"
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - name: "Validate release tag invariants"
        if: ${{ github.ref_type == 'tag' }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"

          if ! [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${TAG}" >&2
            echo "Expected: vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi

          test -f "CHANGELOG.md"

          NOTES_FILE="release_notes.md"

          awk -v tag="${TAG}" '
            BEGIN { inside=0; found=0 }
            $0 ~ "^##[[:space:]]+" tag "([[:space:]]|$)" { inside=1; found=1; next }
            $0 ~ "^##[[:space:]]+" && inside==1 { exit }
            inside==1 { print }
            END { if (found==0) exit 2 }
          ' "CHANGELOG.md" > "${NOTES_FILE}" || {
            echo "Missing CHANGELOG section for ${TAG}" >&2
            echo "Expected heading: \"## ${TAG}\"" >&2
            exit 1
          }

          if [[ ! -s "${NOTES_FILE}" ]]; then
            echo "Empty release notes for ${TAG} in CHANGELOG.md" >&2
            exit 1
          fi

          rm -f "${NOTES_FILE}"

      - name: "Validate release tag points to main HEAD"
        if: ${{ github.ref_type == 'tag' }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"

          git fetch --no-tags origin main:refs/remotes/origin/main

          TAG_COMMIT="$(git rev-list -n 1 "${TAG}")"
          MAIN_COMMIT="$(git rev-parse refs/remotes/origin/main)"

          if [ "${TAG_COMMIT}" != "${MAIN_COMMIT}" ]; then
            echo "Release tag does not point to origin/main HEAD: ${TAG}" >&2
            echo "Tag commit:  ${TAG_COMMIT}" >&2
            echo "Main commit: ${MAIN_COMMIT}" >&2
            exit 1
          fi

      - name: "Generate deterministic split plan evidence"
        shell: bash
        run: |
          set -euo pipefail

          rm -rf ci
          mkdir -p ci

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            php .github/scripts/split-plan.php \
              --out=ci/split-plan.A.json \
              --tag="${GITHUB_REF_NAME}"

            php .github/scripts/split-plan.php \
              --out=ci/split-plan.B.json \
              --tag="${GITHUB_REF_NAME}"
          else
            php .github/scripts/split-plan.php \
              --out=ci/split-plan.A.json

            php .github/scripts/split-plan.php \
              --out=ci/split-plan.B.json
          fi

          sha256sum ci/split-plan.A.json | awk '{print $1}' > ci/split-plan.A.sha256
          sha256sum ci/split-plan.B.json | awk '{print $1}' > ci/split-plan.B.sha256

          diff -u ci/split-plan.A.sha256 ci/split-plan.B.sha256

          mv ci/split-plan.A.json ci/split-plan.json
          sha256sum ci/split-plan.json | awk '{print $1}' > ci/split-plan.sha256

          rm -f ci/split-plan.B.json ci/split-plan.A.sha256 ci/split-plan.B.sha256

      - name: "Build publish matrix from allowlist"
        id: matrix
        shell: bash
        run: |
          set -euo pipefail

          test -f ".github/split-publish-packages.json"
          test -f "ci/split-plan.json"

          MATRIX="$(
            php -r '
              $allowPath = ".github/split-publish-packages.json";
              $planPath = "ci/split-plan.json";

              $allowRaw = file_get_contents($allowPath);
              if ($allowRaw === false) {
                  fwrite(STDERR, "Cannot read {$allowPath}\n");
                  exit(1);
              }

              $planRaw = file_get_contents($planPath);
              if ($planRaw === false) {
                  fwrite(STDERR, "Cannot read {$planPath}\n");
                  exit(1);
              }

              $allow = json_decode($allowRaw, true, 512, JSON_THROW_ON_ERROR);
              $plan = json_decode($planRaw, true, 512, JSON_THROW_ON_ERROR);

              if (!is_array($allow) || ($allow["schemaVersion"] ?? null) !== "coretsia.splitPublishPackages.v1") {
                  fwrite(STDERR, "Invalid split publish allowlist schema\n");
                  exit(1);
              }

              if (!is_array($plan) || ($plan["schemaVersion"] ?? null) !== "coretsia.splitPlan.v1") {
                  fwrite(STDERR, "Invalid split plan schema\n");
                  exit(1);
              }

              $allowPackages = $allow["packages"] ?? null;
              if (!is_array($allowPackages)) {
                  fwrite(STDERR, "Invalid allowlist packages\n");
                  exit(1);
              }

              $planPackages = $plan["packages"] ?? null;
              if (!is_array($planPackages)) {
                  fwrite(STDERR, "Invalid split plan packages\n");
                  exit(1);
              }

              $byId = [];
              foreach ($planPackages as $pkg) {
                  if (!is_array($pkg)) {
                      fwrite(STDERR, "Invalid split plan package entry\n");
                      exit(1);
                  }

                  $id = $pkg["package_id"] ?? null;
                  if (!is_string($id) || $id === "") {
                      fwrite(STDERR, "Invalid split plan package_id\n");
                      exit(1);
                  }

                  if (isset($byId[$id])) {
                      fwrite(STDERR, "Duplicate package_id in split plan: {$id}\n");
                      exit(1);
                  }

                  $byId[$id] = $pkg;
              }

              $seen = [];
              $include = [];

              foreach ($allowPackages as $entry) {
                  if (!is_array($entry)) {
                      fwrite(STDERR, "Invalid allowlist package entry\n");
                      exit(1);
                  }

                  $id = $entry["package_id"] ?? null;

                  if (!is_string($id) || $id === "") {
                      fwrite(STDERR, "Allowlist package_id must be a non-empty string\n");
                      exit(1);
                  }

                  $entryKeys = array_keys($entry);
                  if ($entryKeys !== ["package_id"]) {
                      fwrite(STDERR, "Invalid allowlist keys for {$id}: expected only package_id\n");
                      exit(1);
                  }

                  if (isset($seen[$id])) {
                      fwrite(STDERR, "Duplicate package_id in allowlist: {$id}\n");
                      exit(1);
                  }
                  $seen[$id] = true;

                  if (!isset($byId[$id])) {
                      fwrite(STDERR, "Allowlisted package is missing from split plan: {$id}\n");
                      exit(1);
                  }

                  $pkg = $byId[$id];

                  $pathPrefix = $pkg["pathPrefix"] ?? null;
                  $splitRepo = $pkg["splitRepo"] ?? null;
                  $composerName = $pkg["composerName"] ?? null;

                  if (!is_string($pathPrefix) || $pathPrefix === "" || !str_ends_with($pathPrefix, "/")) {
                      fwrite(STDERR, "Invalid pathPrefix for {$id}\n");
                      exit(1);
                  }

                  if (!is_string($splitRepo) || $splitRepo === "") {
                      fwrite(STDERR, "Invalid splitRepo for {$id}\n");
                      exit(1);
                  }

                  if (!is_string($composerName) || $composerName === "") {
                      fwrite(STDERR, "Invalid composerName for {$id}\n");
                      exit(1);
                  }

                  $parts = explode("/", $id, 2);
                  if (count($parts) !== 2) {
                      fwrite(STDERR, "Invalid package_id format: {$id}\n");
                      exit(1);
                  }

                  [$layer, $slug] = $parts;

                  $repoParts = explode("/", $splitRepo, 2);
                  if (count($repoParts) !== 2 || $repoParts[0] === "" || $repoParts[1] === "") {
                      fwrite(STDERR, "Invalid splitRepo format for {$id}: {$splitRepo}\n");
                      exit(1);
                  }

                  [$splitOwner, $splitRepoName] = $repoParts;

                  $include[] = [
                      "package_id" => $id,
                      "layer" => $layer,
                      "slug" => $slug,
                      "prefix" => rtrim($pathPrefix, "/"),
                      "split_repo" => $splitRepo,
                      "split_owner" => $splitOwner,
                      "split_repo_name" => $splitRepoName,
                      "composer_name" => $composerName,
                  ];
              }

              usort($include, static fn(array $a, array $b): int => strcmp($a["package_id"], $b["package_id"]));

              if ($include === []) {
                  fwrite(STDERR, "Split publish allowlist is empty\n");
                  exit(1);
              }

              echo json_encode(
                  ["include" => $include],
                  JSON_UNESCAPED_SLASHES | JSON_UNESCAPED_UNICODE | JSON_THROW_ON_ERROR
              );
            '
          )"

          echo "matrix=${MATRIX}" >> "${GITHUB_OUTPUT}"

      - name: "Upload CI evidence artifacts (split plan)"
        uses: actions/upload-artifact@v7
        with:
          name: "split-publish-plan-${{ github.ref_name }}"
          if-no-files-found: error
          retention-days: 30
          path: |
            ci/split-plan.json
            ci/split-plan.sha256

  publish:
    name: "split publish / ${{ matrix.package_id }}"
    runs-on: ubuntu-latest
    needs:
      - prepare

    concurrency:
      group: split-publish-${{ matrix.split_repo }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    env:
      LAYER: ${{ matrix.layer }}
      SLUG: ${{ matrix.slug }}
      PREFIX: ${{ matrix.prefix }}
      SPLIT_REPO: ${{ matrix.split_repo }}
      SPLIT_OWNER: ${{ matrix.split_owner }}
      SPLIT_REPO_NAME: ${{ matrix.split_repo_name }}
      COMPOSER_NAME: ${{ matrix.composer_name }}

    steps:
      - name: "Checkout: monorepo"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "Validate package composer identity"
        shell: bash
        run: |
          set -euo pipefail

          ACTUAL="$(
            php -r '
              $path = getenv("PREFIX") . "/composer.json";
              $raw = file_get_contents($path);
              if ($raw === false) {
                  fwrite(STDERR, "Cannot read composer.json\n");
                  exit(1);
              }

              $json = json_decode($raw, true, 512, JSON_THROW_ON_ERROR);
              echo is_array($json) ? ($json["name"] ?? "") : "";
            '
          )"

          if [ "${ACTUAL}" != "${COMPOSER_NAME}" ]; then
            echo "Composer name mismatch: expected ${COMPOSER_NAME}, got ${ACTUAL}" >&2
            exit 1
          fi

      - name: "Create split branch"
        shell: bash
        run: |
          set -euo pipefail

          SPLIT_BRANCH="split-${LAYER}-${SLUG}-${GITHUB_SHA}"

          git branch -D "${SPLIT_BRANCH}" 2>/dev/null || true

          git subtree split \
            --prefix="${PREFIX}" \
            -b "${SPLIT_BRANCH}"

          echo "SPLIT_BRANCH=${SPLIT_BRANCH}" >> "${GITHUB_ENV}"

      - name: "Create GitHub App token for split repository"
        id: split-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.SPLIT_PUBLISH_APP_CLIENT_ID }}
          private-key: ${{ secrets.SPLIT_PUBLISH_APP_PRIVATE_KEY }}
          owner: ${{ matrix.split_owner }}
          repositories: ${{ matrix.split_repo_name }}
          permission-contents: write

      - name: "Verify split repository token access"
        shell: bash
        env:
          SPLIT_TOKEN: ${{ steps.split-token.outputs.token }}
        run: |
          set -euo pipefail

          response_file="$(mktemp)"

          cleanup() {
            rm -f "${response_file}"
          }
          trap cleanup EXIT

          curl -fsS \
            -H "Authorization: Bearer ${SPLIT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${SPLIT_REPO}" \
            > "${response_file}"

          php -r '
          $path = $argv[1] ?? "";
          $raw = file_get_contents($path);

          if ($raw === false) {
              fwrite(STDERR, "Cannot read GitHub API response\n");
              exit(1);
          }

          $payload = json_decode($raw, true, 512, JSON_THROW_ON_ERROR);

          if (!is_array($payload)) {
              fwrite(STDERR, "Invalid GitHub API response\n");
              exit(1);
          }

          echo json_encode(
              [
                  "full_name" => $payload["full_name"] ?? null,
                  "permissions" => $payload["permissions"] ?? null,
              ],
              JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES | JSON_THROW_ON_ERROR
          ), PHP_EOL;
          ' "${response_file}"

      - name: "Push split main on monorepo main push"
        if: ${{ github.ref_type == 'branch' && github.ref_name == 'main' }}
        shell: bash
        env:
          SPLIT_TOKEN: ${{ steps.split-token.outputs.token }}
        run: |
          set -euo pipefail

          SPLIT_REMOTE="https://x-access-token:${SPLIT_TOKEN}@github.com/${SPLIT_REPO}.git"

          for attempt in 1 2 3 4 5; do
            if git push "${SPLIT_REMOTE}" \
              "${SPLIT_BRANCH}:refs/heads/main"; then
              exit 0
            fi

            echo "Split publish push failed for ${SPLIT_REPO}; retry ${attempt}/5" >&2
            sleep $((attempt * 10))
          done

          echo "Split publish push failed for ${SPLIT_REPO} after retries" >&2
          exit 1

      - name: "Push split release tag on monorepo tag push"
        if: ${{ github.ref_type == 'tag' }}
        shell: bash
        env:
          SPLIT_TOKEN: ${{ steps.split-token.outputs.token }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          SPLIT_REMOTE="https://x-access-token:${SPLIT_TOKEN}@github.com/${SPLIT_REPO}.git"

          push_with_retry() {
            local source_ref="$1"
            local target_ref="$2"

            for attempt in 1 2 3 4 5; do
              if git push "${SPLIT_REMOTE}" "${source_ref}:${target_ref}"; then
                return 0
              fi

              echo "Split publish push failed for ${SPLIT_REPO} ${target_ref}; retry ${attempt}/5" >&2
              sleep $((attempt * 10))
            done

            echo "Split publish push failed for ${SPLIT_REPO} ${target_ref} after retries" >&2
            return 1
          }

          if ! [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${TAG}" >&2
            exit 1
          fi

          set +e
          git ls-remote --exit-code --tags "${SPLIT_REMOTE}" "refs/tags/${TAG}" >/dev/null 2>&1
          ls_remote_status="$?"
          set -e

          if [ "${ls_remote_status}" -eq 0 ]; then
            echo "Split tag already exists in ${SPLIT_REPO}: ${TAG}" >&2
            echo "Refusing to overwrite immutable release tag." >&2
            exit 1
          fi

          if [ "${ls_remote_status}" -ne 2 ]; then
            echo "Failed to check split tag existence in ${SPLIT_REPO}: ${TAG}" >&2
            exit "${ls_remote_status}"
          fi

          push_with_retry "${SPLIT_BRANCH}" "refs/heads/main"

          git tag -d "${TAG}" 2>/dev/null || true

          git \
            -c user.name="coretsia-split-publisher[bot]" \
            -c user.email="actions@users.noreply.github.com" \
            tag -a "${TAG}" -m "${TAG}" "${SPLIT_BRANCH}"

          push_with_retry "refs/tags/${TAG}" "refs/tags/${TAG}"
