title = "Coretsia Secret Leakage Gate"

[extend]
useDefault = true

[[allowlists]]
description = "Coretsia generated, dependency, and fixture paths"

paths = [
    '''(^|/)\.git/.*$''',
    '''(^|/)\.tmp/.*$''',
    '''(^|/)vendor/.*$''',
    '''(^|/)framework/vendor/.*$''',
    '''(^|/)skeleton/vendor/.*$''',
    '''(^|/)framework/var/.*$''',
    '''(^|/)skeleton/var/.*$''',
    '''(^|/)var/.*$''',
    '''(^|/)framework/tools/tests/Fixtures/Gitleaks/.*$''',
]

[[allowlists]]
description = "Coretsia deterministic placeholder tokens"

regexTarget = "match"

regexes = [
    '''(?i)\b(REDACTED|DUMMY_SECRET|TEST_ONLY_SECRET|NOT_A_SECRET|PLACEHOLDER_SECRET)\b''',
]
