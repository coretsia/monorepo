# Deptrac allowlist policy.
# This file may only exclude tests, fixtures, vendors, or tooling-only files.
# It MUST NOT exclude framework/packages/**/src/**.

exclude_files:
  - '#(^|/)fixtures(/|$)#'
  - '#(^|/)tests(/|$)#'
  - '#(^|/)vendor(/|$)#'
