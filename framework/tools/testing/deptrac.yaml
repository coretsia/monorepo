deptrac:
  paths:
    - '../../packages/core/contracts/src'
    - '../../packages/core/dto-attribute/src'
    - '../../packages/core/foundation/src'
    - '../../packages/core/kernel/src'
    - '../../packages/devtools/cli-spikes/src'
    - '../../packages/devtools/internal-toolkit/src'
    - '../../packages/platform/cli/src'
    - '../../packages/platform/worker/src'

  exclude_files:
    - '#(^|/)fixtures(/|$)#'
    - '#(^|/)tests(/|$)#'
    - '#(^|/)vendor(/|$)#'

  layers:
    - name: 'core.contracts'
      collectors:
        - type: classLike
          value: '^Coretsia\\Contracts\\.*'
    - name: 'core.dto_attribute'
      collectors:
        - type: classLike
          value: '^Coretsia\\Dto\\Attribute\\.*'
    - name: 'core.foundation'
      collectors:
        - type: classLike
          value: '^Coretsia\\Foundation\\.*'
    - name: 'core.kernel'
      collectors:
        - type: classLike
          value: '^Coretsia\\Kernel\\.*'
    - name: 'devtools.cli_spikes'
      collectors:
        - type: classLike
          value: '^Coretsia\\Devtools\\CliSpikes\\.*'
    - name: 'devtools.internal_toolkit'
      collectors:
        - type: classLike
          value: '^Coretsia\\Devtools\\InternalToolkit\\.*'
    - name: 'platform.cli'
      collectors:
        - type: classLike
          value: '^Coretsia\\Platform\\Cli\\.*'
    - name: 'platform.worker'
      collectors:
        - type: classLike
          value: '^Coretsia\\Platform\\Worker\\.*'

  ruleset:
    'core.contracts': [ ]
    'core.dto_attribute': [ ]
    'core.foundation':
      - 'core.contracts'
    'core.kernel':
      - 'core.contracts'
      - 'core.foundation'
    'devtools.cli_spikes':
      - 'core.contracts'
      - 'platform.cli'
    'devtools.internal_toolkit': [ ]
    'platform.cli':
      - 'core.contracts'
    'platform.worker':
      - 'core.contracts'
      - 'core.foundation'
      - 'core.kernel'
